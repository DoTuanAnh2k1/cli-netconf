# =============================================================================
# K8s Deployment — CLI NETCONF Full Mode
#
# SSH server + xác thực qua mgt-service + kết nối MAAPI tới ConfD.
# User SSH vào pod → auth qua mgt-service → tự động chạy cli-netconf.
#
# Triển khai:
#   kubectl apply -f deploy/k8s.yaml
#
# Truy cập:
#   ssh admin@<node-ip> -p <nodeport>
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cli-netconf
  labels:
    app: cli-netconf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cli-netconf
  template:
    metadata:
      labels:
        app: cli-netconf
    spec:
      containers:
        - name: cli-netconf
          image: cli-netconf-full:latest
          ports:
            - containerPort: 22
              name: ssh
          env:
            - name: CONFD_IPC_ADDR
              value: "confd-service.default.svc.cluster.local"
            - name: CONFD_IPC_PORT
              value: "4565"
            - name: MGT_SERVICE_URL
              value: "http://mgt-service.default.svc.cluster.local:3000"
            - name: NE_NAME
              value: "smf"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cli-netconf
spec:
  type: NodePort
  selector:
    app: cli-netconf
  ports:
    - port: 22
      targetPort: 22
      name: ssh
