apiVersion: apps/v1
kind: Deployment
metadata:
  name: cli-netconf
  labels:
    app: cli-netconf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cli-netconf
  template:
    metadata:
      labels:
        app: cli-netconf
    spec:
      containers:
        - name: cli-netconf
          image: cli-netconf:latest
          ports:
            - containerPort: 2222
              name: ssh
          env:
            - name: SSH_ADDR
              value: ":2222"
            - name: MGT_SERVICE_URL
              value: "http://mgt-service.default.svc.cluster.local:3000"
            - name: NETCONF_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cli-netconf-secret
                  key: netconf-username
            - name: NETCONF_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cli-netconf-secret
                  key: netconf-password
            - name: SSH_HOST_KEY_PATH
              value: "/etc/ssh/host_key"
          volumeMounts:
            - name: host-key
              mountPath: /etc/ssh
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: host-key
          secret:
            secretName: cli-netconf-host-key
---
apiVersion: v1
kind: Service
metadata:
  name: cli-netconf
spec:
  type: NodePort
  selector:
    app: cli-netconf
  ports:
    - port: 2222
      targetPort: 2222
      name: ssh
